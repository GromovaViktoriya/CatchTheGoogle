<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Catch The Google</title>
</head>
<body>
<main>
    <section class="container" id="root">
        <div class="top-items" id="settings">
            <div class="line">
                <label for="01">Grid size</label>
                <select name="selectGrid" id="01">
                    <option value="4">4x4</option>
                    <option value="5">5x5</option>
                    <option value="7">7x7</option>
                    <option value="8">8x8</option>
                </select>
            </div>
            <div class="line">
                <label for="02">Points to win</label>
                <select name="selectPointsToWin" id="02">
                    <option value="10">10 pts</option>
                    <option value="20">20 pts</option>
                    <option value="30">30 pts</option>
                    <option value="40">40 pts</option>
                </select>
            </div>
            <div class="line">
                <label for="03">Points to lose</label>
                <select name="selectPointsToLose" id="03">
                    <option value="5">5 pts</option>
                    <option value="10">10 pts</option>
                    <option value="15">15 pts</option>
                    <option value="20">20 pts</option>
                </select>
            </div>
            <div class="line">
                <label for="04">Google Jump Interval</label>
                <select name="selectGoogleJumpInterval" id="04">
                    <option value="1">1 sec</option>
                    <option value="2">2 sec</option>
                    <option value="3">3 sec</option>
                    <option value="4">4 sec</option>
                </select>
            </div>
            <div class="switch-button">
                <label>Sound on</label>
                <button class="toggle" onclick="toggleSound()">
                    <span class="icon-slider"></span>
                </button>
            </div>
        </div>
        <div class="main-elements" id="game-interface">
            <button class="button main-button">START GAME</button>
            <div class="points-container" id="points-container">
                <div class="result-block">
                    <span class="result-title">Player 1</span>
                    <img src="img/icons/man01.svg" alt="man">
                    <span class="result">0</span>
                </div>
                <div class="result-block">
                    <span class="result-title">Player 2</span>
                    <img src="img/icons/man02.svg" alt="man">
                    <span class="result">0</span>
                </div>
                <div class="result-block">
                    <span class="result-title">Google:</span>
                    <img src="img/icons/googleIcon.svg" alt="googleIcon">
                    <span class="result">0</span>
                </div>
                <div class="result-block">
                    <span class="result-title">Time:</span>
                    <span class="result">00:00</span>
                </div>
            </div>
            <!--            <table>: Это основной тег для создания таблицы.-->
            <!--            <tr>: Этот тег представляет строку в таблице. -->
            <!--            <td>: Этот тег представляет ячейку в таблице.-->
<!--            <table class="table"></table>-->
        </div>
    </section>
</main>
<script src="index.js" type="module"></script>
</body>
</html>
